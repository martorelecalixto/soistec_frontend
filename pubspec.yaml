name: sistrade
description: "A new Flutter project."
publish_to: 'none' # Remove this line if você quiser publicar no pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  bcrypt: ^1.1.3
  http: ^0.13.6
  shared_preferences: ^2.2.2 # ✅ Adicionado para armazenamento local
  mask_text_input_formatter: ^2.0.0
  google_fonts: ^4.0.4
  intl: ^0.18.1
  syncfusion_flutter_pdf: ^25.1.35  # (ou a última versão disponível)
  printing: ^5.12.0  # ou a versão mais recente
  pdf: ^3.10.7  # ou a versão mais recente disponível

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Se desejar adicionar assets, descomente e edite as linhas abaixo:
  assets:
     - assets/logo.png

  # Se desejar adicionar fontes personalizadas, edite aqui:
